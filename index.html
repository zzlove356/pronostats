<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>PronoStats · Analyses football approfondies</title>
  <meta name="description" content="Analyses de pronostics football détaillées : xG, compos, charge physique, arbitre, meilleures cotes, paris safe/simple et gestion de bankroll.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=6">
</head>
<body>
  <header class="site">
    <div class="wrap nav">
      <a class="brand" href="index.html"><span class="dot">P</span>Prono<b>Stats</b></a>
      <div class="nav-right">
        <nav class="nav-links">
          <a href="index.html" class="active" data-i18n="nav_matches">Analyse des matchs</a>
          <a href="bankroll.html" data-i18n="nav_bankroll">Gestion du bankroll</a>
          <a href="tickets.html" data-i18n="nav_tickets">Vérifier un ticket</a>
        </nav>
        <div class="lang-switch">
          <button data-lang="fr" onclick="setLang('fr')">FR</button>
          <button data-lang="it" onclick="setLang('it')">IT</button>
        </div>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="hero">
      <span class="eyebrow" data-i18n="hero_eyebrow">Analyses approfondies</span>
      <h1><span data-i18n="hero_title_1">Des pronostics football</span><br><span data-i18n="hero_title_2">argumentés par la donnée.</span></h1>
      <p class="lead" data-i18n="hero_lead">xG, compositions, charge physique…</p>
    </section>

    <div class="section-head">
      <h2 data-i18n="home_recent">Matchs analysés récemment</h2>
      <span class="sub" data-i18n="home_recent_sub">Clique sur un match</span>
    </div>

    <div class="toolbar">
      <div class="search-box">
        <input id="matchSearch" type="search" autocomplete="off" data-i18n-ph="search_ph" placeholder="🔍 Rechercher…" oninput="applyFilter()">
        <button class="search-clear" id="searchClear" onclick="clearSearch()" title="✕" aria-label="clear">✕</button>
      </div>
      <div class="chips" id="compChips"></div>
      <div class="count" id="matchCount"></div>
    </div>

    <div class="grid" id="matchGrid"></div>
    <div class="no-results" id="noResults" hidden data-i18n="no_results">Aucun match ne correspond à ta recherche.</div>

    <div class="disclaimer" data-i18n="disclaimer_home" style="margin-top:30px">Rappel…</div>
  </main>

  <footer class="site">
    <div class="wrap">
      <span data-i18n="footer_note">PronoStats</span>
      <span data-i18n="footer_18">18+</span>
    </div>
  </footer>

  <script src="i18n.js?v=6"></script>
  <script>document.write('<script src="data.js?t=' + Date.now() + '"><\/script>');</script>
  <script src="app.js?v=6"></script>
</body>
</html>
