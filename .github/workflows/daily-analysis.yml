name: Analyse foot quotidienne
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: daily-analysis
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generer les analyses du jour
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo '' | base64 -d | gunzip > generate.mjs
          node generate.mjs
      - name: Publier sur le depot
        run: |
          git config user.name "pronostats-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          git diff --staged --quiet || (git commit -m "Analyses auto du $(date +%F)" && git push)
